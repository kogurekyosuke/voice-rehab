<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="声文字">
<meta name="theme-color" content="#1A1A1A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>声文字</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#F7F6F3;font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;-webkit-tap-highlight-color:transparent;}
#app{max-width:480px;margin:0 auto;padding:12px;display:flex;flex-direction:column;gap:10px;min-height:100dvh;}

#hint{background:#E6F1FB;border:0.5px solid #B5D4F4;border-radius:10px;padding:10px 14px;font-size:13px;color:#185FA5;line-height:1.5;}

#preview{background:#1A1A1A;border-radius:14px;padding:20px 18px;min-height:100px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;position:relative;}
#preview-text{font-size:clamp(22px,7vw,40px);font-weight:700;color:#fff;line-height:1.5;word-break:break-all;}
#preview-empty{font-size:14px;color:rgba(255,255,255,0.3);}
#preview-hint{position:absolute;top:10px;right:12px;font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:.05em;}

#input-row{display:flex;gap:8px;align-items:flex-end;}
#voice-input{flex:1;font-size:17px;padding:12px 14px;border-radius:10px;border:0.5px solid rgba(0,0,0,0.18);background:#fff;color:#1a1a1a;resize:none;font-family:inherit;line-height:1.5;outline:none;height:52px;overflow:hidden;}
#send-btn{flex-shrink:0;width:52px;height:52px;border-radius:10px;border:none;background:#1A1A1A;cursor:pointer;display:flex;align-items:center;justify-content:center;}

#phrase-label{font-size:11px;color:#aaa;letter-spacing:.05em;padding:0 2px;}
#phrase-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
#phrase-scroll::-webkit-scrollbar{display:none;}
.pbtn{flex-shrink:0;padding:10px 14px;border-radius:10px;border:0.5px solid rgba(0,0,0,0.12);background:#fff;font-size:14px;color:#1a1a1a;cursor:pointer;white-space:nowrap;font-family:inherit;}
.pbtn:active{background:#f0f0ee;}

#hist-card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:14px;overflow:hidden;}
#hist-head{padding:9px 14px;font-size:11px;color:#aaa;letter-spacing:.05em;border-bottom:0.5px solid rgba(0,0,0,0.08);display:flex;justify-content:space-between;align-items:center;}
#hist-clear{font-size:11px;color:#888;background:none;border:none;cursor:pointer;padding:0;}
#hist-list{max-height:130px;overflow-y:auto;padding:8px 14px;display:flex;flex-direction:column;gap:6px;}
.hitem{display:flex;gap:8px;align-items:baseline;font-size:13px;cursor:pointer;}
.htime{color:#bbb;font-size:11px;min-width:36px;}
.hbody{color:#1a1a1a;line-height:1.4;}

/* 全画面モード */
#fullscreen{display:none;position:fixed;inset:0;background:#1A1A1A;z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:32px;cursor:pointer;}
#fullscreen.show{display:flex;}
#fs-text{font-size:clamp(32px,10vw,72px);font-weight:700;color:#fff;line-height:1.4;text-align:center;word-break:break-all;letter-spacing:.01em;}
#fs-hint{position:absolute;bottom:40px;font-size:13px;color:rgba(255,255,255,0.3);letter-spacing:.05em;}
</style>
</head>
<body>
<div id="app">
  <div id="hint">💡 テキスト欄をタップ → キーボードの🎤で話す → 送信で全画面表示</div>

  <div id="preview" onclick="openFullscreen()">
    <span id="preview-empty">フレーズを選ぶか、下の欄に入力してください</span>
    <span id="preview-text" style="display:none;"></span>
    <span id="preview-hint" style="display:none;">タップで全画面</span>
  </div>

  <div id="input-row">
    <textarea id="voice-input" placeholder="ここをタップして入力 / 🎤音声入力" rows="1"></textarea>
    <button id="send-btn" onclick="submit()" aria-label="送信">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <div id="phrase-label">よく使うフレーズ</div>
  <div id="phrase-scroll"></div>

  <div id="hist-card">
    <div id="hist-head">
      <span>会話履歴</span>
      <button id="hist-clear" onclick="clearAll()">全消去</button>
    </div>
    <div id="hist-list"><span id="hist-empty" style="color:#bbb;font-size:13px;">まだ履歴がありません</span></div>
  </div>
</div>

<div id="fullscreen" onclick="closeFullscreen()">
  <div id="fs-text"></div>
  <div id="fs-hint">タップして戻る</div>
</div>

<script>
const PHRASES = ["こんにちは","お疲れ様です","休憩しましょう","調子はどうですか？"];
let currentText = "", history = [];

const previewEmpty = document.getElementById('preview-empty');
const previewText = document.getElementById('preview-text');
const previewHint = document.getElementById('preview-hint');
const voiceInput = document.getElementById('voice-input');
const histList = document.getElementById('hist-list');
const histEmpty = document.getElementById('hist-empty');
const fsText = document.getElementById('fs-text');
const fullscreen = document.getElementById('fullscreen');

function timeNow(){return new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});}

function setDisplay(text){
  currentText = text;
  previewEmpty.style.display = 'none';
  previewText.style.display = '';
  previewHint.style.display = '';
  previewText.textContent = text;
}

function addHistory(text, src){
  if(!text.trim()) return;
  history.unshift({text:text.trim(),src,time:timeNow()});
  renderHistory();
}

function renderHistory(){
  document.querySelectorAll('.hitem').forEach(e=>e.remove());
  histEmpty.style.display = history.length ? 'none' : '';
  history.forEach(h=>{
    const d = document.createElement('div');
    d.className = 'hitem';
    d.innerHTML = `<span class="htime">${h.time}</span><span class="hbody">${h.src==='phrase'?'📋':'✏️'} ${h.text}</span>`;
    d.onclick = ()=>{setDisplay(h.text);openFullscreen();};
    histList.appendChild(d);
  });
}

function submit(){
  const t = voiceInput.value.trim();
  if(!t) return;
  setDisplay(t);
  addHistory(t,'input');
  voiceInput.value = '';
  voiceInput.style.height = '52px';
  openFullscreen();
}

function openFullscreen(){
  if(!currentText) return;
  fsText.textContent = currentText;
  fullscreen.classList.add('show');
}

function closeFullscreen(){fullscreen.classList.remove('show');}

function clearAll(){
  history = [];
  currentText = '';
  renderHistory();
  previewEmpty.style.display = '';
  previewText.style.display = 'none';
  previewHint.style.display = 'none';
}

voiceInput.addEventListener('keydown', e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submit();}
});
voiceInput.addEventListener('input', ()=>{
  voiceInput.style.height = '52px';
  voiceInput.style.height = Math.min(voiceInput.scrollHeight,120)+'px';
});

PHRASES.forEach(p=>{
  const btn = document.createElement('button');
  btn.className = 'pbtn';
  btn.textContent = p;
  btn.onclick = ()=>{setDisplay(p);addHistory(p,'phrase');openFullscreen();};
  document.getElementById('phrase-scroll').appendChild(btn);
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
