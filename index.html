<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="声文字">
<meta name="theme-color" content="#F8F5EE">
<title>声文字 — Type B</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#F8F5EE;font-family:-apple-system,'Hiragino Sans',sans-serif;-webkit-tap-highlight-color:transparent;color:#0D1B2A;}
#app{max-width:480px;margin:0 auto;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:100dvh;}

#hint{background:rgba(107,122,58,0.1);border:1px solid #7A7A45;border-radius:10px;padding:10px 14px;font-size:12px;color:#6B7A3A;line-height:1.5;}

#preview{background:#0D1B2A;border:1.5px solid #7A7A45;border-radius:12px;padding:20px 18px;min-height:110px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;position:relative;}
#preview-text{font-size:clamp(22px,7vw,40px);font-weight:700;color:#fff;line-height:1.5;word-break:break-all;}
#preview-empty{font-size:13px;color:rgba(255,255,255,0.4);}
#preview-hint{position:absolute;top:10px;right:12px;font-size:10px;color:#8A9A50;letter-spacing:.05em;}

#input-row{display:flex;gap:8px;align-items:flex-end;}
#voice-input{flex:1;font-size:16px;padding:12px 14px;border-radius:10px;border:1.5px solid #7A7A45;background:#fff;color:#0D1B2A;resize:none;font-family:inherit;line-height:1.5;outline:none;height:52px;overflow:hidden;}
#voice-input::placeholder{color:rgba(13,27,42,0.35);}
#voice-input:focus{border-color:#6B7A3A;}
#send-btn{flex-shrink:0;width:52px;height:52px;border-radius:10px;border:none;background:linear-gradient(135deg,#D4B84A,#F0D84A);cursor:pointer;display:flex;align-items:center;justify-content:center;}

#phrase-label{font-size:10px;color:#6B7A3A;letter-spacing:.08em;padding:0 2px;}
#phrase-scroll{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pbtn{padding:13px 10px;border-radius:10px;border:1.5px solid #7A7A45;background:#fff;font-size:14px;color:#0D1B2A;cursor:pointer;font-family:inherit;text-align:center;line-height:1.4;}
.pbtn:active{background:rgba(107,122,58,0.15);}

#hist-card{background:#fff;border:1.5px solid #7A7A45;border-radius:12px;overflow:hidden;}
#hist-head{padding:9px 14px;font-size:10px;color:#6B7A3A;letter-spacing:.08em;border-bottom:1px solid #7A7A45;display:flex;justify-content:space-between;align-items:center;}
#hist-clear{font-size:10px;color:#6B7A3A;background:none;border:none;cursor:pointer;padding:0;}
#hist-list{max-height:130px;overflow-y:auto;padding:8px 14px;display:flex;flex-direction:column;gap:6px;}
.hitem{display:flex;gap:8px;align-items:baseline;font-size:13px;cursor:pointer;}
.htime{color:#8A9A50;font-size:10px;min-width:36px;}
.hbody{color:#0D1B2A;line-height:1.4;}

#fullscreen{display:none;position:fixed;inset:0;background:#0D1B2A;z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:32px;cursor:pointer;}
#fullscreen.show{display:flex;}
#fs-text{font-size:clamp(36px,11vw,80px);font-weight:700;color:#fff;line-height:1.3;text-align:center;word-break:break-all;}
#fs-accent{width:48px;height:2px;background:linear-gradient(90deg,#6B7A3A,#8A9A50);margin:20px auto 0;border-radius:1px;}
#fs-hint{position:absolute;bottom:40px;font-size:11px;color:rgba(107,122,58,0.5);letter-spacing:.05em;}
</style>
</head>
<body>
<div id="app">
  <div id="hint">💡 テキスト欄をタップ → キーボードの🎤で話す → 送信で全画面表示</div>
  <div id="preview" onclick="openFullscreen()">
    <span id="preview-empty">フレーズを選ぶか、下の欄に入力してください</span>
    <span id="preview-text" style="display:none;"></span>
    <span id="preview-hint" style="display:none;">タップで全画面</span>
  </div>
  <div id="input-row">
    <textarea id="voice-input" placeholder="ここをタップして入力 / 🎤音声入力" rows="1"></textarea>
    <button id="send-btn" onclick="submit()" aria-label="送信">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0D1B2A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div id="phrase-label">よく使うフレーズ</div>
  <div id="phrase-scroll"></div>
  <div id="hist-card">
    <div id="hist-head"><span>会話履歴</span><button id="hist-clear" onclick="clearAll()">全消去</button></div>
    <div id="hist-list"><span id="hist-empty" style="color:rgba(13,27,42,0.35);font-size:13px;">まだ履歴がありません</span></div>
  </div>
</div>
<div id="fullscreen" onclick="closeFullscreen()">
  <div id="fs-text"></div>
  <div id="fs-accent"></div>
  <div id="fs-hint">タップして戻る</div>
</div>
<script>
const PHRASES=["こんにちは","お疲れ様です","休憩しましょう","調子はどうですか？"];
let currentText="",history=[];
const previewEmpty=document.getElementById('preview-empty'),previewText=document.getElementById('preview-text'),previewHint=document.getElementById('preview-hint'),voiceInput=document.getElementById('voice-input'),histList=document.getElementById('hist-list'),histEmpty=document.getElementById('hist-empty'),fsText=document.getElementById('fs-text'),fullscreen=document.getElementById('fullscreen');
function timeNow(){return new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});}
function setDisplay(text){currentText=text;previewEmpty.style.display='none';previewText.style.display='';previewHint.style.display='';previewText.textContent=text;}
function addHistory(text,src){if(!text.trim())return;history.unshift({text:text.trim(),src,time:timeNow()});renderHistory();}
function renderHistory(){document.querySelectorAll('.hitem').forEach(e=>e.remove());histEmpty.style.display=history.length?'none':'';history.forEach(h=>{const d=document.createElement('div');d.className='hitem';d.innerHTML=`<span class="htime">${h.time}</span><span class="hbody">${h.src==='phrase'?'◆':'◇'} ${h.text}</span>`;d.onclick=()=>{setDisplay(h.text);openFullscreen();};histList.appendChild(d);});}
function submit(){const t=voiceInput.value.trim();if(!t)return;setDisplay(t);addHistory(t,'input');voiceInput.value='';voiceInput.style.height='52px';openFullscreen();}
function openFullscreen(){if(!currentText)return;fsText.textContent=currentText;fullscreen.classList.add('show');}
function closeFullscreen(){fullscreen.classList.remove('show');}
function clearAll(){history=[];currentText='';renderHistory();previewEmpty.style.display='';previewText.style.display='none';previewHint.style.display='none';}
voiceInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submit();}});
voiceInput.addEventListener('input',()=>{voiceInput.style.height='52px';voiceInput.style.height=Math.min(voiceInput.scrollHeight,120)+'px';});
PHRASES.forEach(p=>{const btn=document.createElement('button');btn.className='pbtn';btn.textContent=p;btn.onclick=()=>{setDisplay(p);addHistory(p,'phrase');openFullscreen();};document.getElementById('phrase-scroll').appendChild(btn);});
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
</html>
